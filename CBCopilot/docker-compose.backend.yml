# Pull-inverse architecture (HRDD parity): the backend is the single Docker
# stack on its host. It does NOT share a Docker network with frontends —
# frontends live on different machines (by design), and the backend polls
# them over the LAN / Tailscale / hostname URL that the admin registered
# in the Frontends tab. No shared networks, no service-name DNS needed.
#
# Host port is configurable via CBC_BACKEND_PORT (default 8100). Override
# via Portainer's Environment variables without editing the compose.
# Container port stays 8000 internally.
#
# No explicit container_name: Portainer prefixes containers with the stack
# name, so multiple stacks can coexist on one host without colliding.
services:
  cbc-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${CBC_BACKEND_PORT:-8100}:8000"
    volumes:
      - cbc-data:/app/data
    environment:
      - DEPLOYMENT_JSON_PATH=/app/config/deployment_backend.json
      - CBC_DATA_DIR=/app/data

volumes:
  cbc-data:
