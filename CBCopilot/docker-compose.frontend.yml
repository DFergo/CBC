# Pull-inverse architecture (HRDD parity): frontends live on their own
# Docker host — backend and frontend do NOT share a Docker network. The
# backend polls this frontend over the LAN / Tailscale / hostname URL that
# the admin registered in the Frontends tab. The frontend just has to be
# reachable on CBC_FRONTEND_PORT from the backend's host.
#
# CBC_BACKEND_URL (optional): a few features still need the sidecar to
# reach the backend directly — session recovery, user uploads, guardrail
# thresholds. Set it to the backend's reachable URL, e.g.
#   http://100.78.12.109:8100   (Tailscale)
#   http://mac-studio.local:8100 (Bonjour)
#   http://backend.lan:8100     (local DNS)
# If unset, those features fail silently but the main chat loop still works.
#
# Host port is configurable via CBC_FRONTEND_PORT (default 8190). The
# container port stays 80 (Nginx).
#
# No explicit container_name: Portainer prefixes containers with the stack
# name so multiple frontend stacks (one per campaign/union) can coexist on a
# single host. Top-level named volumes are also prefixed with the stack name,
# so each stack gets its own isolated `/app/data` — no shared state.
services:
  cbc-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${CBC_FRONTEND_PORT:-8190}:80"
    volumes:
      - cbc-frontend-data:/app/data
    environment:
      - DEPLOYMENT_JSON_PATH=/app/config/deployment_frontend.json
      - CBC_BACKEND_URL=${CBC_BACKEND_URL:-}

volumes:
  cbc-frontend-data:
